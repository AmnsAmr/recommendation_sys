services:

  # API Gateway
  api-gateway:
    build: ./backend/api-gateway-service
    container_name: api-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      USER_SERVICE_URL: http://user-service:8081
      VIDEO_SERVICE_URL: http://video-service:8082
      REC_SERVICE_URL: http://recommendation-service:8083
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - user-service
      - video-service
      - recommendation-service
    networks:
      - platform-net
    restart: on-failure

  # User Service
  user-service:
    build: ./backend/user-service
    container_name: user-service
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: ${SUPABASE_DB_URL_USER}
      SPRING_DATASOURCE_USERNAME: ${SUPABASE_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SUPABASE_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL}
      KAFKA_SSL_KEYSTORE_LOCATION: /app/client.keystore.p12
      KAFKA_SSL_KEYSTORE_PASSWORD: ${KAFKA_SSL_KEYSTORE_PASSWORD}
      KAFKA_SSL_KEY_PASSWORD: ${KAFKA_SSL_KEY_PASSWORD}
      KAFKA_SSL_TRUSTSTORE_LOCATION: /app/client.truststore.jks
      KAFKA_SSL_TRUSTSTORE_PASSWORD: ${KAFKA_SSL_TRUSTSTORE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      SERVER_PORT: 8081
    networks:
      - platform-net
    restart: on-failure

  # Video Service
  video-service:
    build: ./backend/video-service
    container_name: video-service
    ports:
      - "8082:8082"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: ${SUPABASE_DB_URL_VIDEO}
      SPRING_DATASOURCE_USERNAME: ${SUPABASE_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SUPABASE_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: 8082
    networks:
      - platform-net
    restart: on-failure

  # Recommendation Service
  recommendation-service:
    build: ./backend/recommendation-service
    container_name: recommendation-service
    ports:
      - "8083:8083"
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: ${SUPABASE_DB_URL_REC}
      SPRING_DATASOURCE_USERNAME: ${SUPABASE_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SUPABASE_DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SVD_SIDECAR_URL: ${SVD_SIDECAR_URL}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: 8083
    depends_on:
      - redis
    networks:
      - platform-net
    restart: on-failure

  # SVD Python Sidecar (FastAPI)
  svd-sidecar:
    build: ./backend/svd-sidecar
    container_name: svd-sidecar
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${SUPABASE_DB_URL_REC}
      DATABASE_USERNAME: ${SUPABASE_DB_USERNAME}
      DATABASE_PASSWORD: ${SUPABASE_DB_PASSWORD}
      PORT: 8000
    networks:
      - platform-net
    restart: on-failure

  # Frontend
  frontend:
    build: ./frontend/web-frontend
    container_name: frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://api-gateway:8080
    depends_on:
      - api-gateway
    networks:
      - platform-net
    restart: on-failure

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - platform-net
    restart: on-failure
    command: redis-server --appendonly yes

volumes:
  redis-data:

networks:
  platform-net:
    driver: bridge
